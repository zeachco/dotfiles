# Ubuntu-specific Alacritty config with Zellij

[general]
import = [
    "~/.config/alacritty/base.toml",
    "~/dotfiles/themes/current/alacritty.toml"
]

[terminal.shell]
program = "/usr/bin/env"
args = ["zellij"]

[font]
size = 11.0

[font.normal]
family = "VictorMono Nerd Font"
style = "Regular"

[font.bold]
family = "VictorMono Nerd Font"
style = "Bold"

[font.italic]
family = "VictorMono Nerd Font"
style = "Italic"
