# Ubuntu-specific Alacritty config with Zellij

[general]
import = [
    "~/.config/alacritty/base.toml",
    "~/dotfiles/themes/current/alacritty.toml"
]

[terminal.shell]
program = "/bin/bash"
args = ["-c", "if zellij list-sessions 2>/dev/null | grep -q '^1 '; then exec zellij attach 1; else exec zellij; fi"]

[font]
size = 11.0

[font.normal]
family = "VictorMono Nerd Font"
style = "Regular"

[font.bold]
family = "VictorMono Nerd Font"
style = "Bold"

[font.italic]
family = "VictorMono Nerd Font"
style = "Italic"
